{% extends 'base.html' %}
{% block title %}Реєстрація{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card">
            <div class="card-body p-5">
                <h3 class="text-center mb-4">Реєстрація</h3>
                
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <input type="text" name="username" class="form-control" placeholder="Ім'я користувача" required>
                    </div>
                    <div class="mb-3">
                        <input type="email" name="email" class="form-control" placeholder="Email" required>
                    </div>
                    <div class="mb-3">
                        <input type="password" name="password1" class="form-control" placeholder="Пароль" required>
                    </div>
                    <div class="mb-3">
                        <input type="password" name="password2" class="form-control" placeholder="Повторіть пароль" required>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100 py-2">Зареєструватися</button>
                </form>
                
                <div class="text-center mt-3">
                    Вже маєте акаунт? <a href="{% url 'rest_app:login' %}">Увійти</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
