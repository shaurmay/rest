{% extends 'base.html' %}
{% block title %}{{ dish.name }} - Смаколик{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-6">
        <img src="{{ dish.image.url|default:'https://via.placeholder.com/600x400?text=' }}{{ dish.name }}" 
             class="img-fluid rounded shadow" alt="{{ dish.name }}">
    </div>
    <div class="col-md-6">
        <h1>{{ dish.name }}</h1>
        <h2 class="price mb-4">{{ dish.price }} грн</h2>
        <p class="lead">{{ dish.description }}</p>
        
        <form method="post" action="{% url 'rest_app:cart_add' dish.id %}">
            {% csrf_token %}
            <div class="input-group mb-3" style="max-width: 180px;">
                <button type="button" class="btn btn-outline-secondary" onclick="this.parentNode.querySelector('input').stepDown()">–</button>
                <input type="number" name="quantity" value="1" min="1" class="form-control text-center">
                <button type="button" class="btn btn-outline-secondary" onclick="this.parentNode.querySelector('input').stepUp()">+</button>
            </div>
            <button type="submit" class="btn btn-primary btn-lg">Додати в кошик</button>
        </form>
    </div>
</div>
{% endblock %}
