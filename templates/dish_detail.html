{% extends 'base.html' %}
{% block title %}{{ dish.name }}{% endblock %}
{% block content %}
<div class="row bg-white p-4 rounded-4 shadow-sm">
    <div class="col-md-6 text-center">
        <img src="{{ dish.image.url }}" class="img-fluid rounded-4" style="max-height: 400px;">
    </div>
    <div class="col-md-6">
        <h1 class="display-5 fw-bold">{{ dish.name }}</h1>
        <span class="badge bg-success mb-3">{{ dish.category.name }}</span>
        <p class="lead text-muted">{{ dish.description }}</p>
        <hr>
        <h3 class="text-warning fw-bold mb-4">{{ dish.price }} грн</h3>
        
        <form action="#" method="post">
            {% csrf_token %}
            <div class="d-flex align-items-center">
                <input type="number" name="quantity" value="1" min="1" class="form-control me-3" style="width: 100px;">
                <button type="submit" class="btn btn-dark btn-lg flex-grow-1">Додати в кошик</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
