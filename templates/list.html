{% extends 'base.html' %}
{% block title %}Меню - Смаколик{% endblock %}

{% block content %}
<h2 class="mb-4 text-center">Наше меню</h2>

<div class="row g-4">
    {% for dish in dishes %}
    <div class="col-md-4 col-lg-3">
        <div class="card h-100">
            <img src="{{ dish.image.url|default:'https://via.placeholder.com/300x200?text=' }}{{ dish.name }}" class="card-img-top" alt="">
            <div class="card-body d-flex flex-column">
                <h5 class="card-title">{{ dish.name }}</h5>
                <p class="text-muted small flex-grow-1">{{ dish.description|truncatewords:12 }}</p>
                <div class="d-flex justify-content-between align-items-center mt-auto">
                    <span class="price">{{ dish.price }} грн</span>
                    <a href="{% url 'rest_app:dish_detail' dish.id %}" class="btn btn-primary btn-sm">Детальніше</a>
                </div>
            </div>
        </div>
    </div>
    {% empty %}
    <p class="text-center">Поки що немає страв у меню</p>
    {% endfor %}
</div>
{% endblock %}
