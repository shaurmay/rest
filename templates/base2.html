<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Смаколик 2{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f1e3; font-family: system-ui, sans-serif; }
        .navbar { background-color: #2c3e50 !important; box-shadow: 0 3px 10px rgba(0,0,0,0.15); }
        .hero {
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://source.unsplash.com/1600x900/?restaurant') center/cover;
            color: white;
            padding: 160px 0;
        }
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            transition: all 0.3s;
        }
        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(230, 126, 34, 0.3);
        }
        .price { color: #e67e22; font-weight: 700; font-size: 1.4rem; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="{% url 'rest_app:home' %}">🍽️ Смаколик 2</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="{% url 'rest_app:home' %}">Головна 2</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'rest_app:list' %}">Меню 2</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'rest_app:cart_detail' %}">Кошик 2</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'rest_app:order_history' %}">Замовлення 2</a></li>
                
                {% if user.is_authenticated %}
                    <li class="nav-item"><a class="nav-link text-warning" href="#">👤 {{ user.username }}</a></li>
                    <li class="nav-item"><a class="nav-link text-danger" href="{% url 'rest_app:logout' %}">Вийти</a></li>
                {% else %}
                    <li class="nav-item"><a class="nav-link" href="{% url 'rest_app:login' %}">Увійти</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'rest_app:register' %}">Реєстрація</a></li>
                {% endif %}
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    {% block content %}{% endblock %}
</div>

<footer class="bg-dark text-white text-center py-4 mt-5">
    <p class="mb-0">&copy; 2026 Смаколик 2 • Івано-Франківськ</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
