{% extends 'base.html' %}
{% block title %}Увійти{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card">
            <div class="card-body p-5">
                <h3 class="text-center mb-4">Увійти в акаунт</h3>
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-primary w-100">Увійти</button>
                </form>
                <p class="text-center mt-3">
                    Немає акаунту? <a href="{% url 'rest_app:register' %}">Зареєструватися</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
